<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Book My Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/FrontEnd/Assest/logo.png">
    <link rel="stylesheet" href="/FrontEnd/CSS/admin/admin-home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar"></div>

<!-- ===== MAIN CONTENT ===== -->
<main id="admin-home">
    <h1>Admin Dashboard</h1>

    <!-- Stats Cards -->
    <section class="stats">
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <h2>Customers</h2>
            <p id="customer-count">0</p>
        </div>

        <div class="stat-card">
            <i class="fas fa-user-cog"></i>
            <h2>Providers</h2>
            <p id="provider-count">0</p>
        </div>

        <div class="stat-card">
            <i class="fas fa-toolbox"></i>
            <h2>Services</h2>
            <p id="service-count">0</p>
        </div>

        <div class="stat-card">
            <i class="fas fa-calendar-check"></i>
            <h2>Bookings</h2>
            <p id="booking-count">0</p>
        </div>
    </section>
    
    <div class="booking-status-overview">
    <h2>Booking Status Overview</h2>

    <div class="status-cards">
        <div class="status-card pending">
            <i class="fa-solid fa-clock"></i>
            <h3>Pending</h3>
            <p id="pending-count">0</p>
        </div>

        <div class="status-card confirmed">
            <i class="fa-solid fa-circle-check"></i>
            <h3>Confirmed</h3>
            <p id="confirmed-count">0</p>
        </div>

        <div class="status-card completed">
            <i class="fa-solid fa-check-double"></i>
            <h3>Completed</h3>
            <p id="completed-count">0</p>
        </div>

        <div class="status-card cancelled">
            <i class="fa-solid fa-ban"></i>
            <h3>Cancelled</h3>
            <p id="cancelled-count">0</p>
        </div>
    </div>
</div>
</main>
<
<script src="/FrontEnd/JS/admin-sidebar.js"></script>
<script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
<script src="/FrontEnd/JS/admin/admin-homepage.js"></script>
</body>
</html>
