<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/FrontEnd/CSS/admin/admin-servicepage.css" />
    <link
      rel="stylesheet"
      href="/FrontEnd/CSS/customer/customer-home-page.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="sidebar"></div>

    <main class="content">
      <h1>Services</h1>

      <div class="table-controls">
        <input type="text" id="searchInput" placeholder="Search service..." />
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Category</th>
              <th>Title</th>
              <th>Provider ID</th>
              <th>Price (LKR)</th>
              <th>Description</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="serviceTable"></tbody>
        </table>
      </div>
    </main>

    <div id="providerModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Service Details</h2>
        <div id="providerDetails"></div>
      </div>
    </div>

    <script src="/FrontEnd/JS/admin-sidebar.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/FrontEnd/JS/admin/admin-servicepage.js"></script>
  </body>
</html>
