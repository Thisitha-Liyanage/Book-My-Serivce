<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Bookings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="/FrontEnd/Assest/logo.png">
    <link rel="stylesheet" href="/FrontEnd/CSS/admin/admin-bookingpage.css">
    <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- Sidebar -->
<div id="sidebar"></div>

<!-- Main Content -->
<main class="admin-content">
    <h1>Bookings</h1>

    <!-- Controls -->
    <div class="table-controls">
        <input type="text" id="searchInput" placeholder="Search booking...">
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Service ID</th>
                    <th>Customer ID</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="bookingTable">
            </tbody>
        </table>
    </div>
</main>

    <!-- Customer Details Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Booking Details</h2>
        <div id="bookingDetails">
            <!-- Customer info will be injected here -->
        </div>
    </div>
</div>

<script src="/FrontEnd/JS/admin-sidebar.js"></script>
<script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
<script src="/FrontEnd/JS/admin/admin-bookingpage.js"></script>
</body>
</html>
