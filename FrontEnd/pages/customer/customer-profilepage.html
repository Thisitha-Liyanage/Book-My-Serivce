<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-profilepage.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="icon" href="/FrontEnd/Assest/logo.png">
<link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css">
</head>
<body>

<div id="sidebar"></div>

<div class="profile-container">
    <div class="profile-card">

        <div class="profile-header">
            <i class="fa fa-user profile-icon"></i>
            <h2>Customer Profile</h2>
        </div>

        <div class="profile-details">

            <div class="profile-row">
                <label>Name</label>
                <span id="customerName">-</span>
            </div>

            <div class="profile-row">
                <label>Email</label>
                <span id="customerEmail">-</span>
            </div>

            <div class="profile-row">
                <label>Phone</label>
                <span id="customerPhone">-</span>
            </div>

            <div class="profile-row">
                <label>Province</label>
                <span id="customerProvince">-</span>
            </div>

            <div class="profile-row">
                <label>City</label>
                <span id="customerCity">-</span>
            </div>

            <div class="profile-row">
                <label>Village</label>
                <span id="customerVillage">-</span>
            </div>

        </div>

    </div>
</div>

<script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
<script src="/FrontEnd/JS/sidebar.js"></script>
<script src="/FrontEnd/JS/customer/customer-profilepage.js"></script>

</body>
</html>
