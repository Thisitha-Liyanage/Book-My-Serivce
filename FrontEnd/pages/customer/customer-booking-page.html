<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bookings 📖</title>
    <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="/FrontEnd/Assest/logo.png">
    <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-boking-page.css">

</head>
<body>
    <div id="sidebar"></div>

    <section id="booking-section">

        <h1 class="page-title">Bookings</h1>

        <div class="booking-list">

            <!-- Booking Card -->
            <div class="booking-card">
                <div class="booking-info">
                    <h2>Electrician</h2>
                    <p class="provider">Provider Name</p>
                    <p>Booking Date : <strong>12-03-2026</strong></p>
                    <p>Booking Time : <strong>10.30 AM</strong></p>
                </div>

                <div class="booking-actions">
                    <span class="status confirmed">Confirmed</span>
                    <div class="buttons">
                        <button class="cancel">Cancel</button>
                    </div>
                </div>
            </div>

        </div>

        <button class="new-booking">New Booking</button>
    </section>

    <script src="/FrontEnd/JS/sidebar.js""></script>
    <script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
    <script src="/FrontEnd/JS/customer/customer-bookingpage.js"></script>
</body>
</html>
