<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Service</title>
    <link rel="icon" href="/FrontEnd/Assest/logo.png">
    <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-ratingpage.css">
    <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="sidebar"></div>
    <div class="rating-container">

        <h2>Rate Your Service</h2>

        <div class="service-info">
            <p><strong>Provider:</strong> <span id="providerName">John Doe</span></p>
            <p><strong>Service:</strong> <span id="serviceTitle">Electrician</span></p>
        </div>

        <div class="rating-box">
            <label>Rate:</label>
            <div class="stars" id="starContainer">
                <i class="fa-solid fa-star star" data-value="1"></i>
                <i class="fa-solid fa-star star" data-value="2"></i>
                <i class="fa-solid fa-star star" data-value="3"></i>
                <i class="fa-solid fa-star star" data-value="4"></i>
                <i class="fa-solid fa-star star" data-value="5"></i>
            </div>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="review" placeholder="Write your experience..."></textarea>
        </div>

        <button id="submitRating">Submit Rating</button>

    </div>
    <script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
    <script src="/FrontEnd/JS/sidebar.js"></script>
    <script src="/FrontEnd/JS/customer/customer-ratingpage.js"></script>
</body>

</html>
