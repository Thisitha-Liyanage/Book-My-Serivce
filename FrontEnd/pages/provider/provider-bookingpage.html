<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Provider | My Bookings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/FrontEnd/Assest/logo.png" />
    <link
      rel="stylesheet"
      href="/FrontEnd/CSS/customer/customer-home-page.css"
    />
    <link
      rel="stylesheet"
      href="/FrontEnd/CSS/prvider/provider-bookingpage.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="sidebar"></div>

    <main class="content">
      <h1>My Bookings</h1>

      <!-- Search -->
      <div class="table-controls">
        <input type="text" id="searchInput" placeholder="Search booking..." />
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Booking ID</th>
              <th>Customer ID</th>
              <th>Service ID</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="bookingTable"></tbody>
        </table>
      </div>
    </main>

    <!-- Modal -->
    <div id="customerModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>

        <h2>Booking Details</h2>

        <div id="customerDetails"></div>

        <div class="status-section">
          <label for="bookingStatus">Update Status:</label>
          <select id="bookingStatus">
            <option value="">--Select--</option>
            <option value="ACCEPTED">Accept</option>
            <option value="REJECTED">Reject</option>
            <option value="COMPLETED">Completed</option>
          </select>
          <button id="updateStatusBtn">Update</button>
        </div>
      </div>
    </div>

    <script src="/FrontEnd/JS/provider-sidebar.js"></script>
    <script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
    <script src="/FrontEnd/JS/provider/provider-bookingpage.js"></script>
  </body>
</html>
