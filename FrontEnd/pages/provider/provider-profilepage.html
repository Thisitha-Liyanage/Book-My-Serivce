<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Provider Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/FrontEnd/CSS/prvider/provider-profilepage.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css">
<link rel="icon" href="/FrontEnd/Assest/logo.png">
</head>
<body>

<div id="sidebar"></div>

<div class="profile-container">
    <div class="profile-card">

        <div class="profile-header">
            <i class="fa fa-user profile-icon"></i>
            <h2>Provider Profile</h2>
        </div>

        <div class="profile-details">

            <div class="profile-row">
                <label>Name</label>
                <span id="providerName">-</span>
            </div>

            <div class="profile-row">
                <label>Email</label>
                <span id="providerEmail">-</span>
            </div>

            <div class="profile-row">
                <label>Phone</label>
                <span id="providerPhone">-</span>
            </div>

            <div class="profile-row">
                <label>Province</label>
                <span id="providerProvince">-</span>
            </div>

            <div class="profile-row">
                <label>City</label>
                <span id="providerCity">-</span>
            </div>

            <div class="profile-row">
                <label>Village</label>
                <span id="providerVillage">-</span>
            </div>

            <div class="profile-row">
                <label>Role</label>
                <span id="providerRole" class="role-badge">PROVIDER</span>
            </div>

        </div>

    </div>
</div>

<script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
<script src="/FrontEnd/JS/provider-sidebar.js"></script>
<script src="/FrontEnd/JS/provider/provider-profilepage.js"></script>
</body>
</html>
