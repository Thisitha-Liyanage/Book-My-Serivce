<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Provider | My Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/FrontEnd/Assest/logo.png" />
  <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css" />
  <link rel="stylesheet" href="/FrontEnd/CSS/prvider/provider-servicepage.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
  <div id="sidebar"></div>

  <main class="content">
    <h1>My Services</h1>

    <!-- Top Controls -->
    <div class="table-controls">
      <input type="text" id="searchInput" placeholder="Search service..." />

      <button class="btn add-btn" onclick="openAddModal()">
        <i class="fas fa-plus"></i> Add Service
      </button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service Name</th>
            <th>Category</th>
            <th>Price (LKR)</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="serviceTable"></tbody>
      </table>
    </div>
  </main>

  <!-- Update Service Modal -->
  <div id="updateModal" class="modal">
    <div class="modal-content">
      <h3>Update Service</h3>

      <input type="text" id="updateId" placeholder="Service ID" disabled />
      <input type="text" id="updateName" placeholder="Service Name" />
      <select id="updateCategory">
        <!-- Options will be dynamically added -->
      </select>
      <input type="number" id="updatePrice" placeholder="Price" />
      <input type="text" id="updateDescription" placeholder="Description" />

      <select id="updateStatus">
        <option value="AVAILABLE">Active</option>
        <option value="UNAVAILABLE">Inactive</option>
      </select>

      <div class="modal-buttons">
        <button class="save-btn" onclick="confirmSave()">Save</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3 id="confirmTitle">Confirm Action</h3>
      <p id="confirmMessage">Are you sure?</p>

      <div class="modal-buttons">
        <button class="save-btn" id="confirmYes">Yes</button>
        <button class="cancel-btn" onclick="closeConfirmModal()">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Add Service Modal -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <h3>Add New Service</h3>

      <input type="text" id="addName" placeholder="Service Name" />
      <select id="addCategory">
        <!-- Options will be dynamically added -->
      </select>
      <input type="number" id="addPrice" placeholder="Price" />
      <input type="text" id="addDescription" placeholder="Description" />

      <select id="addStatus">
        <option value="Available">Available</option>
        <option value="Unavailable">Unavailable</option>
      </select>

      <div class="modal-buttons">
        <button class="save-btn" onclick="addService()">Add</button>
        <button class="cancel-btn" onclick="closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Service Details Modal -->
  <div id="serviceModal" class="service-modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeServiceModal()">&times;</span>

      <h2>Service Details</h2>

      <!-- Service info -->
      <div id="serviceDetails">
        <p><strong>ID:</strong> <span id="detailId"></span></p>
        <p><strong>Name:</strong> <span id="detailName"></span></p>
        <p><strong>Category:</strong> <span id="detailCategory"></span></p>
        <p><strong>Price:</strong> LKR <span id="detailPrice"></span></p>
        <p>
          <strong>Description:</strong> <span id="detailDescription"></span>
        </p>
        <p><strong>Status:</strong> <span id="detailStatus"></span></p>
      </div>

      <!-- Action buttons -->
    </div>
  </div>
  <!-- Input to fetch booking by ID -->
  <div class="fetch-booking">
    <input type="number" id="bookingIdInput" placeholder="Enter Booking ID" />
  </div>

  <script src="/FrontEnd/JS/provider-sidebar.js"></script>
  <script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
  <script src="/FrontEnd/JS/provider/provider-servicepage.js"></script>
</body>

</html>
