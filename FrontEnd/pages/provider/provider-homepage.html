<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Service Provider | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/FrontEnd/Assest/logo.png">
    <link rel="stylesheet" href="/FrontEnd/CSS/prvider/provider-homepage.css">
    <link rel="stylesheet" href="/FrontEnd/CSS/customer/customer-home-page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main id="provider-dashboard">

        <h1>Service Provider Dashboard</h1>

        <div class="dashboard-top">
            <button class="availability-btn" onclick="openAvailabilityModal()">
                <i class="fas fa-toggle-on"></i> Change Availability
            </button>
        </div>

        <!-- ===== Stats Section ===== -->
        <section class="stats">

            <div class="stat-card">
                <i class="fas fa-toolbox"></i>
                <h2>Total Services</h2>
                <p id="service-count">0</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <h2>Total Bookings</h2>
                <p id="total-bookings">0</p>
            </div>

        </section>

        <div class="booking-status-overview">
            <h2>Booking Status Overview</h2>

            <div class="status-cards">
                <div class="status-card pending">
                    <i class="fa-solid fa-clock"></i>
                    <h3>Pending</h3>
                    <p id="pending-count">0</p>
                </div>

                <div class="status-card confirmed">
                    <i class="fa-solid fa-circle-check"></i>
                    <h3>Confirmed</h3>
                    <p id="confirmed-count">0</p>
                </div>

                <div class="status-card completed">
                    <i class="fa-solid fa-check-double"></i>
                    <h3>Completed</h3>
                    <p id="completed-count">0</p>
                </div>

                <div class="status-card cancelled">
                    <i class="fa-solid fa-ban"></i>
                    <h3>Cancelled</h3>
                    <p id="cancelled-count">0</p>
                </div>
            </div>

    </main>

    <!-- Availability Modal -->
    <div id="availabilityModal" class="modal">
        <div class="modal-content">
            <h3>Change Availability</h3>

            <select id="availabilitySelect">
                <option value="Available">Available</option>
                <option value="Unavailable">Unavailable</option>
            </select>

            <div class="modal-buttons">
                <button class="save-btn" onclick="saveAvailability()">Save</button>
                <button class="cancel-btn" onclick="closeAvailabilityModal()">Cancel</button>
            </div>
        </div>
    </div>


    <script src="/FrontEnd/JS/provider-sidebar.js"></script>
    <script src="/FrontEnd/JS/jquery-3.6.4.min.js"></script>
    <script src="/FrontEnd/JS/provider/provider.homepage.js"></script>
</body>

</html>
